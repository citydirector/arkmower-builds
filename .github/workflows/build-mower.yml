name: Build Mower

on:
 schedule:
   - cron: "0 6 * * *"          # 每天 UTC 6:00 = 北京时间 14:00                                                                                                                                            
 workflow_dispatch:
   inputs:
     branch:
       description: "选择要构建的分支"
       required: true
       default: "both"
       type: choice
       options: [both, main, dev]

permissions:
 contents: write

jobs:
 build:
   strategy:
     matrix:
       branch: [main, dev]
   runs-on: windows-latest
   if: |
     !cancelled() && (
       github.event_name != 'workflow_dispatch' ||
       github.event.inputs.branch == 'both' ||
       github.event.inputs.branch == matrix.branch
     )

   steps:
     # 直接从上游拉代码（不需要 fork）
     - uses: actions/checkout@v4                                                                                                                                                                            
       with:
         repository: ArkMowers/arknights-mower                                                                                                                                                              
         ref: ${{ matrix.branch }}                                                                                                                                                                          
         submodules: recursive
         fetch-depth: 1

     # 版本信息
     - id: version                                                                                                                                                                                          
       shell: pwsh
       run: |
         $sha = "${{ github.sha }}".Substring(0,7)
         $date = Get-Date -Format "yyyyMMdd"
         $b = "${{ matrix.branch }}"
         echo "artifact=mower-${b}-${date}-${sha}" >> $env:GITHUB_OUTPUT
         echo "release_tag=mower-${b}-win64" >> $env:GITHUB_OUTPUT
         echo "release_title=Mower $b ($date)" >> $env:GITHUB_OUTPUT

     # 构建前端
     - uses: actions/setup-node@v4
       with:
         node-version: "20"
         cache: npm
         cache-dependency-path: ui/package-lock.json
     - working-directory: ui
       run: |
         npm install
         npm run build

     # 安装 Python 依赖                                                                                                                                                                                     
     - uses: actions/setup-python@v5
       with:
         python-version: "3.12"
         cache: pip
         cache-dependency-path: requirements.txt                                                                                                                                                            
     - run: |
         python -m pip install --upgrade pip wheel setuptools
         python -m pip install -r requirements.txt
         python -m pip install pyinstaller

     # 打包
     - run: pyinstaller webui_zip.spec
     - run: python scripts/fix_runtime_dlls.py                                                                                                                                                              

     # 压缩
     - shell: pwsh
       run: Compress-Archive -Path dist/mower/* -DestinationPath "${{ steps.version.outputs.artifact }}.zip"

     # 发布（同一 tag 反复覆盖）
     - env: { GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
       continue-on-error: true
       shell: pwsh
       run: gh release delete "${{ steps.version.outputs.release_tag }}" --yes --cleanup-tag 2>$null

     - env: { GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
       shell: pwsh
       run: |
         $isPre = "${{ matrix.branch }}" -ne "main"
         gh release create "${{ steps.version.outputs.release_tag }}" `
           --title "${{ steps.version.outputs.release_title }}" `
           --notes "自动构建 ${{ matrix.branch }}@${{ github.sha }}" `
           --prerelease:$isPre `
           "${{ steps.version.outputs.artifact }}.zip"
