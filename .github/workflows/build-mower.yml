name: Build Mower

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "Select branch to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - main
          - dev

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        branch: [main, dev]
      fail-fast: false
    runs-on: windows-latest
    steps:
      # -------- 分支选择过滤 --------
      - name: Check branch selection
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch != 'both' && github.event.inputs.branch != matrix.branch }}
        shell: pwsh
        run: |
          Write-Host "Skipping ${{ matrix.branch }} (user selected ${{ github.event.inputs.branch }})"
          exit 0

      # -------- 检出上游代码 --------
      - uses: actions/checkout@v4
        with:
          repository: ArkMowers/arknights-mower
          ref: ${{ matrix.branch }}
          fetch-depth: 1

      - name: Init submodules
        run: |
          git submodule init
          git submodule update

      # -------- 检查是否有新提交 --------
      - name: Check if upstream has new commits
        id: check
        shell: pwsh
        run: |
          $releaseTag = "mower-${{ matrix.branch }}-win64"
          $currentSha = "${{ github.sha }}"
          $apiUrl = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/tags/$releaseTag"
          try {
            $response = Invoke-RestMethod -Uri $apiUrl -Headers @{ Authorization = "Bearer $env:GH_TOKEN" }
            $lastSha = $response.body -replace '.*@', ''
            if ($lastSha -eq $currentSha) {
              echo "skip=true" >> $env:GITHUB_OUTPUT
              Write-Host "✅ 上游 ${{ matrix.branch }} 无新提交 ($currentSha)，跳过构建"
              exit 0
            }
            Write-Host "📦 上游 ${{ matrix.branch }} 有更新: $lastSha → $currentSha"
          } catch {
            Write-Host "🆕 首次构建 ${{ matrix.branch }} 或查询出错"
          }
          echo "skip=false" >> $env:GITHUB_OUTPUT

      # -------- 版本信息 --------
      - id: version
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0,7)
          $date = Get-Date -Format "yyyyMMdd"
          $b = "${{ matrix.branch }}"
          echo "artifact=mower-${b}-${date}-${sha}" >> $env:GITHUB_OUTPUT
          echo "release_tag=mower-${b}-win64" >> $env:GITHUB_OUTPUT
          echo "release_title=Mower $b ($date)" >> $env:GITHUB_OUTPUT

      # -------- 构建前端 --------
      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - working-directory: ui
        if: steps.check.outputs.skip != 'true'
        run: |
          npm install
          npm run build

      # -------- Python 依赖 --------
      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - if: steps.check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      # -------- 打包 --------
      - if: steps.check.outputs.skip != 'true'
        run: pyinstaller webui_zip.spec

      - name: Fix runtime DLLs
        if: ${{ steps.check.outputs.skip != 'true' && hashFiles('scripts/fix_runtime_dlls.py') != '' }}
        run: python scripts/fix_runtime_dlls.py

      # -------- 压缩 --------
      - shell: pwsh
        if: steps.check.outputs.skip != 'true'
        run: |
          Compress-Archive -Path dist/mower/* -DestinationPath "${{ steps.version.outputs.artifact }}.zip"

      # -------- 发布到 Releases --------
      - name: Remove old release
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        shell: pwsh
        run: |
          gh release delete "${{ steps.version.outputs.release_tag }}" `
            --repo $env:GITHUB_REPOSITORY `
            --yes --cleanup-tag 2>$null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $args = @(
            "${{ steps.version.outputs.release_tag }}",
            "--repo", "$env:GITHUB_REPOSITORY",
            "--title", "${{ steps.version.outputs.release_title }}",
            "--notes", "Auto build ${{ matrix.branch }}@${{ github.sha }}"
          )
          if ("${{ matrix.branch }}" -ne "main") {
            $args += "--prerelease"
          }
          $args += "${{ steps.version.outputs.artifact }}.zip"
          gh release create @args

      # -------- 发送 Server3 通知（成功） --------
      - name: Send notification (success)
        if: ${{ steps.check.outputs.skip != 'true' && success() }}
        shell: pwsh
        env:
          SC3_UID: ${{ secrets.SC3_UID }}
          SC3_SENDKEY: ${{ secrets.SC3_SENDKEY }}
        run: |
          $sha = "${{ github.sha }}".Substring(0,7)
          $branch = "${{ matrix.branch }}"
          $tag = "mower-$branch-win64"
          $url = "https://github.com/citydirector/arkmower-builds/releases/tag/$tag"
          $body = @{
            title = "Mower $branch 构建成功"
            desp = "✅ Mower ($branch) 构建完成  - 提交: $sha  - 下载: $tag"
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri "https://$env:SC3_UID.push.ft07.com/send/$env:SC3_SENDKEY.send" `
            -Method POST -ContentType "application/json" -Body $body

      # -------- 发送 Server3 通知（失败） --------
      - name: Send notification (failure)
        if: ${{ failure() && steps.check.outputs.skip != 'true' }}
        shell: pwsh
        env:
          SC3_UID: ${{ secrets.SC3_UID }}
          SC3_SENDKEY: ${{ secrets.SC3_SENDKEY }}
        run: |
          $sha = "${{ github.sha }}".Substring(0,7)
          $branch = "${{ matrix.branch }}"
          $actionsUrl = "https://github.com/citydirector/arkmower-builds/actions/runs/${{ github.run_id }}"
          $body = @{
            title = "Mower $branch 构建失败"
            desp = "❌ Mower ($branch) 构建失败  - 提交: $sha  - 日志: $actionsUrl"
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri "https://$env:SC3_UID.push.ft07.com/send/$env:SC3_SENDKEY.send" `
            -Method POST -ContentType "application/json" -Body $body
